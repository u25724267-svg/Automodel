# Text-only full language-backbone SFT of Gemma 4 E2B on AfriInstruct.
# Qualify the data and hyperparameters with gemma4_e2b_afriinstruct_peft.yaml
# before committing resources to this configuration.

recipe: FinetuneRecipeForVLM

step_scheduler:
  global_batch_size: 8
  local_batch_size: 1
  ckpt_every_steps: 500
  val_every_steps: 500
  log_remote_every_steps: 10
  loss_average_window_steps: 50
  gc_every_steps: 50
  max_steps: 10000
  num_epochs: null
  save_checkpoint_every_epoch: false

dist_env:
  backend: nccl
  timeout_minutes: 30

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 42
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForImageTextToText.from_pretrained
  pretrained_model_name_or_path: google/gemma-4-E2B-it
  torch_dtype: torch.bfloat16
  attn_implementation: sdpa
  use_liger_kernel: false
  use_sdpa_patching: false
  text_config:
    use_cache: false
    output_hidden_states: true

processor:
  padding_side: right

checkpoint:
  enabled: true
  checkpoint_dir: ${AFRIINSTRUCT_CHECKPOINT_DIR,vlm_checkpoints/gemma4_e2b_afriinstruct_full}
  model_save_format: safetensors
  save_consolidated: final

distributed:
  strategy: fsdp2
  dp_size: none
  tp_size: 1
  cp_size: 1
  pp_size: 1
  sequence_parallel: false
  activation_checkpointing: false

freeze_config:
  freeze_embeddings: true
  freeze_vision_tower: true
  freeze_audio_tower: true
  freeze_language_model: false

loss_fn:
  _target_: nemo_automodel.components.loss.linear_ce.FusedLinearCrossEntropy
  logit_softcapping: 30.0
  reduction: sum

dataset:
  _target_: nemo_automodel.components.datasets.vlm.datasets.make_meta_dataset
  path_or_dataset: ${AFRIINSTRUCT_DATA_DIR,./data/afriinstruct}/train_meta.json
  split: train
  truncate: false
  inject_fake_images: false

packed_sequence:
  pretokenize: true
  max_length: 4096
  pack_size: 4096
  collate_max_length: 4096
  packing_ratio: 0.9
  drop_long_samples: true

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 4
  persistent_workers: true
  pin_memory: true
  shuffle: true
  drop_last: true

validation_dataset:
  _target_: nemo_automodel.components.datasets.vlm.datasets.make_meta_dataset
  path_or_dataset: ${AFRIINSTRUCT_DATA_DIR,./data/afriinstruct}/validation_meta.json
  split: validation

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 2
  persistent_workers: true
  pin_memory: true

optimizer:
  _target_: torch.optim.AdamW
  lr: 2.0e-5
  weight_decay: 0.01
  betas: [0.9, 0.95]
  eps: 1.0e-8

lr_scheduler:
  lr_decay_style: cosine
  lr_warmup_steps: 500
  min_lr: 2.0e-6

clip_grad_norm:
  max_norm: 1.0

wandb:
  enable: false
  project: gemma4-afriinstruct
  name: gemma4-e2b-afriinstruct-full
  tags: [gemma4-e2b, afriinstruct, text-only, full-sft]
  dir: ${AFRIINSTRUCT_WANDB_DIR,./wandb}
